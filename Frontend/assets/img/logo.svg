<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Background with subtle glow/gradient effect typical of sleek design -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c2c2e" />
      <stop offset="100%" stop-color="#1c1c1e" />
    </linearGradient>
    
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e5e5e5" />
    </linearGradient>

    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Squircle Base -->
  <rect width="120" height="120" rx="28" ry="28" fill="url(#bgGrad)" />

  <!-- The "L&F" monogram or Icon -->
  <g transform="translate(60, 60)" filter="url(#shadow)">
    
    <!-- Stylized "L" -->
    <path d="M-18,-18 L-18,20 A4,4 0 0,0 -14,24 L12,24" 
          fill="none" 
          stroke="url(#iconGrad)" 
          stroke-width="10" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Magnifying Glass (Search) -->
    <circle cx="10" cy="-6" r="10" 
            fill="none" 
            stroke="url(#iconGrad)" 
            stroke-width="8" />
    
    <line x1="17" y1="1" x2="26" y2="10" 
          stroke="url(#iconGrad)" 
          stroke-width="8" 
          stroke-linecap="round" />
          
    <circle cx="-18" cy="-28" r="4" fill="url(#iconGrad)" />
  </g>
</svg>
