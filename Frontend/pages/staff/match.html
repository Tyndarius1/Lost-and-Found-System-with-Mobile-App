<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/assets/css/tokens.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/app.css">
    <title>Staff — Match Items</title>
</head>

<body>

    <div class="app">

        <aside class="sidebar card" id="sidebar"></aside>

        <div class="main">

            <header class="topbar card" id="topbar"></header>

            <main class="content">
                <div class="container">

                    <div class="card" style="padding:24px; background: #ffffff;">
                        <div style="font-weight:900; font-size: 24px; letter-spacing: -0.02em;">
                            Match Lost and Found Items
                        </div>

                        <div style="color:var(--muted); margin-top:8px; font-size: 15px;">
                            Select one lost item and one found item to mark as matched.
                        </div>
                    </div>


                    <div class="grid cols-2 animate-in stagger-2" style="margin-top:24px; gap: 24px;">

                        <!-- LOST -->
                        <div class="card" style="padding:24px; background: #ffffff;">

                            <div style="font-weight:900; font-size: 20px;">
                                Items marked as "Lost"
                            </div>

                            <input class="web-input" id="lostSearch" placeholder="Search lost items..."
                                style="margin-top:16px; background: rgba(0,0,0,0.02); padding:12px; border-radius:8px; border:1px solid var(--border);">

                            <div id="lostList" style="margin-top:20px;
                        max-height:400px;
                        overflow:auto;
                        display: flex; flex-direction: column; gap: 8px;">
                            </div>

                        </div>


                        <!-- FOUND -->
                        <div class="card" style="padding:24px; background: #ffffff;">

                            <div style="font-weight:900; font-size: 20px;">
                                Items marked as "Found"
                            </div>

                            <input class="web-input" id="foundSearch" placeholder="Search found items..."
                                style="margin-top:16px; background: rgba(0,0,0,0.02); padding:12px; border-radius:8px; border:1px solid var(--border);">

                            <div id="foundList" style="margin-top:20px;
                        max-height:400px;
                        overflow:auto;
                        display: flex; flex-direction: column; gap: 8px;">
                            </div>

                        </div>

                    </div>


                    <!-- MATCH BUTTON -->
                    <div class="card animate-in stagger-3" style="padding:24px;
                    margin-top:24px;
                    text-align:center; background: #ffffff;">

                        <button class="btn primary" id="matchBtn" style="padding: 16px 32px; font-size: 16px;">
                            Match Selected Items
                        </button>

                        <div id="matchState" style="margin-top:12px;
                      color:var(--muted); font-size: 14px; font-weight: 500;">
                        </div>

                    </div>


                </div>
            </main>

        </div>

    </div>


    <script type="module">

        import { mountSidebar } from "/components/sidebar.js";
        import { mountTopbar } from "/components/topbar.js";
        import { requireAuth, requireRole } from "/core/auth.js";
        import { api } from "/core/api.js";
        import { toast } from "/components/toast.js";


        requireAuth();
        requireRole("staff", "admin");

        mountSidebar("staff");
        mountTopbar();



        let lostItems = [];
        let foundItems = [];

        let selectedLost = null;
        let selectedFound = null;

        function filterItems(items, query) {
            const q = query.trim().toLowerCase();
            if (!q) return items;

            return items.filter(item => {
                const hay = `${item.title ?? ""} ${item.description ?? ""} ${item.location ?? ""} ${item.category ?? ""} ${item.brand ?? ""} ${item.color ?? ""}`.toLowerCase();
                return hay.includes(q);
            });
        }



        function renderList(items, container, type) {
            if (!items.length) {
                container.innerHTML = `<div style="padding:12px; color:var(--muted); border:1px dashed var(--border); border-radius:8px;">No items match your search.</div>`;
                return;
            }

            container.innerHTML =
                items.map(item => `

      <div class="card"
           style="
             padding:10px;
             margin-bottom:8px;
             cursor:pointer;
             border:
               ${(type === "lost" && selectedLost === item.id)
                        ||
                        (type === "found" && selectedFound === item.id)
                        ? "2px solid var(--brand)"
                        : "1px solid var(--border)"
                    };
           "

           data-id="${item.id}">

        <div style="font-weight:800;">
          ${item.title}
        </div>

        <div style="
             font-size:12px;
             color:var(--muted);">
          ${item.location ?? "-"}
        </div>

      </div>

    `).join("");



            container
                .querySelectorAll("[data-id]")
                .forEach(el => {

                    el.onclick = () => {

                        const id = parseInt(el.dataset.id);

                        if (type === "lost")
                            selectedLost = id;
                        else
                            selectedFound = id;

                        const sourceItems = type === "lost" ? lostItems : foundItems;
                        const query = type === "lost"
                            ? document.getElementById("lostSearch").value
                            : document.getElementById("foundSearch").value;

                        renderList(
                            filterItems(sourceItems, query),
                            container,
                            type
                        );

                    };

                });

        }



        async function loadLost() {
            const res =
                await api.get(
                    "/items?type=lost&status=pending"
                );

            lostItems =
                res.data ?? res;

            renderList(
                filterItems(lostItems, document.getElementById("lostSearch").value),
                document.getElementById("lostList"),
                "lost"
            );
        }



        async function loadFound() {
            const res =
                await api.get(
                    "/items?type=found&status=pending"
                );

            foundItems =
                res.data ?? res;

            renderList(
                filterItems(foundItems, document.getElementById("foundSearch").value),
                document.getElementById("foundList"),
                "found"
            );
        }



        document
            .getElementById("matchBtn")
            .onclick = async () => {

                if (!selectedLost || !selectedFound) {
                    toast(
                        "Select both lost and found items",
                        "warn"
                    );
                    return;
                }


                document
                    .getElementById("matchState")
                    .innerHTML = "Matching...";


                try {

                    await api.post(
                        "/matches",
                        {
                            lost_item_id: selectedLost,
                            found_item_id: selectedFound
                        }
                    );


                    toast(
                        "Items matched successfully",
                        "success"
                    );


                    document
                        .getElementById("matchState")
                        .innerHTML = "Match created";


                    selectedLost = null;
                    selectedFound = null;


                    loadLost();
                    loadFound();

                }
                catch (e) {
                    document
                        .getElementById("matchState")
                        .innerHTML = "Failed";
                }

            };



        document.getElementById("lostSearch").addEventListener("input", () => {
            renderList(
                filterItems(lostItems, document.getElementById("lostSearch").value),
                document.getElementById("lostList"),
                "lost"
            );
        });

        document.getElementById("foundSearch").addEventListener("input", () => {
            renderList(
                filterItems(foundItems, document.getElementById("foundSearch").value),
                document.getElementById("foundList"),
                "found"
            );
        });

        loadLost();
        loadFound();


    </script>

    <script type="module" src="/components/toast.js"></script>


    <script type="module">
        import { mountFooter } from "/components/footer.js";
        mountFooter();
    </script>
</body>

</html>
