<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/tokens.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/website.css">
    <title>Lost & Found - Home</title>
</head>

<body class="website-layout web-bg-animated">
    <!-- Premium Navbar replaces sidebar/topbar -->
    <nav id="navbar"></nav>

    <main class="web-main">
        <div class="web-container">

            <!-- Hero Section -->
            <div class="animate-in stagger-1" style="text-align: center; margin-bottom: 64px; margin-top: 32px;">
                <h1 style="font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 16px; font-family: var(--font-display); letter-spacing: -0.03em;">
                    Find What's <span class="hero-gradient">Yours</span>
                </h1>
                <p
                    style="color: var(--text-muted); font-size: 1.25rem; max-width: 600px; margin: 0 auto 32px auto; line-height: 1.6;">
                    The smartest way to report lost items and claim found ones across the campus network.
                </p>
                <div style="display: flex; gap: 16px; justify-content: center;">
                    <button class="web-btn web-btn-primary" onclick="window.location.href='/pages/user/report.html'">
                        Report an Item
                    </button>
                    <button class="web-btn web-btn-glass" onclick="window.location.href='/pages/user/items.html'">
                        Browse Feed
                    </button>
                </div>
            </div>

            <!-- Activity Dashboard / Quick Actions -->
            <div style="margin-bottom: 32px;">
                <h2 style="margin-bottom: 8px; font-size: 1.75rem;" id="welcomeTitle">Welcome back</h2>
                <p style="color: var(--text-muted); margin-bottom: 24px;">Manage your reports and track claims in one
                    place.</p>
            </div>

            <div class="grid cols-3" style="gap: 24px;" id="dashboardCards">
                <!-- Cards will be injected here by JS -->
            </div>

        </div>
    </main>

    <script type="module">
        import { mountNavbar } from "/components/navbar.js";
        import { requireAuth, requireRole, getUser } from "/core/auth.js";
        import { renderActionCard } from "/components/actionCard.js";

        requireAuth();
        requireRole("user", "admin", "staff");

        // Mount the new premium navigation
        mountNavbar();

        const user = getUser();
        if (user) {
            document.getElementById("welcomeTitle").innerHTML = `Welcome back, <span class="text-gradient">${user.name.split(' ')[0]}</span>`;
        }

        // Render Dashboard Cards
        const cardsData = [
            {
                title: "My Reports",
                description: "View the status of items you have reported as lost or found.",
                buttonText: "View Reports",
                href: "/pages/user/my-items.html",
                staggerClass: "stagger-2",
                primary: false,
                iconSvg: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-main)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`
            },
            {
                title: "My Claims",
                description: "Track the approval process for items you are trying to claim.",
                buttonText: "Track Claims",
                href: "/pages/user/my-claims.html",
                staggerClass: "stagger-3",
                primary: false,
                iconSvg: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-main)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>`
            },
            {
                title: "Global Feed",
                description: "Search the entire database for lost and found items in your area.",
                buttonText: "Browse Now",
                href: "/pages/user/items.html",
                staggerClass: "stagger-4",
                primary: true,
                iconSvg: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-main)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>`
            }
        ];

        document.getElementById("dashboardCards").innerHTML = cardsData.map(renderActionCard).join("");
    </script>

    <script type="module">
        import { mountFooter } from "/components/footer.js";
        mountFooter();
    </script>
</body>

</html>
